name: Build GL-MT5000 OpenWrt (DSA)

on:
  workflow_dispatch:

env:
  REPO_URL: https://github.com/openwrt/openwrt
  REPO_BRANCH: openwrt-25.12
  GL_DEVICE_COMMIT: https://github.com/GLiNet-Tech/openwrt.git
  OPENWRT_PATH: /mnt/openwrt
  TZ: Europe/Lisbon

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout build repo
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /usr/local/share/boost "$AGENT_TOOLSDIRECTORY" || true
          df -h /

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk \
            gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
            python3 python3-setuptools rsync swig unzip zlib1g-dev file wget \
            libelf-dev ccache qemu-utils

      - name: Clone OpenWrt (official, openwrt-25.12)
        run: |
          sudo mkdir -p "$OPENWRT_PATH"
          sudo chown "$USER:$USER" "$OPENWRT_PATH"
          git clone --depth 1 -b "$REPO_BRANCH" "$REPO_URL" "$OPENWRT_PATH"
          cd "$OPENWRT_PATH"
          echo "HEAD: $(git rev-parse --short HEAD) on $REPO_BRANCH"

      - name: Cache downloads & ccache
        uses: actions/cache@v4
        with:
          path: |
            /mnt/openwrt/dl
            /mnt/openwrt/.ccache
          key: mt5000-${{ hashFiles('config/mt5000.config', 'scripts/diy.sh', 'files/dsa/rtl8366ub_dsa.c') }}
          restore-keys: mt5000-

      - name: Graft device support + convert switch to DSA
        run: |
          cd "$OPENWRT_PATH"
          bash "$GITHUB_WORKSPACE/scripts/diy.sh"

      - name: Update & install feeds (official only)
        run: |
          cd "$OPENWRT_PATH"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure
        run: |
          cd "$OPENWRT_PATH"
          cp "$GITHUB_WORKSPACE/config/mt5000.config" .config
          make defconfig

      - name: Verify switch driver is selected
        run: |
          cd "$OPENWRT_PATH"
          grep -q '^CONFIG_PACKAGE_kmod-rtl8366ub=y' .config \
            || { echo "ERROR: kmod-rtl8366ub was dropped by defconfig"; exit 1; }
          echo "kmod-rtl8366ub: selected"

      - name: Download sources
        run: |
          cd "$OPENWRT_PATH"
          make -j$(nproc) download || make -j1 download

      - name: Compile firmware
        run: |
          cd "$OPENWRT_PATH"
          make -j$(nproc) || make -j$(nproc) || make -j1 V=s

      - name: Collect firmware
        if: always()
        run: |
          cd "$OPENWRT_PATH"
          mkdir -p "$GITHUB_WORKSPACE/artifact"
          find bin/targets -type f \( -name '*sysupgrade.bin' -o -name '*initramfs*.bin' \
            -o -name '*.manifest' -o -name 'config.buildinfo' \) \
            -exec cp {} "$GITHUB_WORKSPACE/artifact/" \; || true
          cp .config "$GITHUB_WORKSPACE/artifact/resolved.config" || true
          ls -la "$GITHUB_WORKSPACE/artifact/" || true

      - name: Upload firmware artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gl-mt5000-firmware
          path: artifact/
          if-no-files-found: warn
          retention-days: 14
